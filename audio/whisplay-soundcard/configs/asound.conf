# Whisplay Sound Card ALSA configuration
#
# Provides shared playback (dmix) and capture (dsnoop) so multiple
# applications can open the card simultaneously.

defaults.pcm.rate_converter "speexrate_best"

pcm.!default {
    @args [ CARD DEV ]
    @args.CARD {
        type string
        default "whisplaysound"
    }
    @args.DEV {
        type integer
        default 0
    }
    type asym
    playback.pcm "playback"
    capture.pcm "capture"
}

ctl.!default {
    @args [ CARD ]
    @args.CARD {
        type string
        default "whisplaysound"
    }
    type hw
    card $CARD
}

pcm.whisplaysound {
    type asym
    playback.pcm "playback"
    capture.pcm "capture"
}

ctl.whisplaysound {
    type hw
    card whisplaysound
}

pcm.playback {
    type plug
    slave.pcm "dmixed"
}

pcm.capture {
    type plug
    slave.pcm "array"
}

pcm.dmixed {
    type dmix
    ipc_key 555555
    slave {
        pcm "hw:whisplaysound"
        format S16_LE
        rate 48000
        channels 2
        period_size 1024
        buffer_size 4096
    }
}

pcm.array {
    type dsnoop
    ipc_key 666666
    slave {
        pcm "hw:whisplaysound"
        format S16_LE
        rate 48000
        channels 2
        period_size 1024
        buffer_size 4096
    }
}
